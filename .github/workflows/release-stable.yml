# Phát hành stable OTA: ZIP không config.sh + update-stable.json (Magisk nút Cập nhật).
name: Release stable OTA

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Verify stable OTA channel
        run: |
          node -e "
          const c=require('./ota/channel.json');
          if(c.activeChannel!=='stable'||!c.stable?.otaEnabled) {
            console.error('Set ota/channel.json activeChannel=stable and stable.otaEnabled=true');
            process.exit(1);
          }
          "

      - name: Sync module & build OTA ZIP
        run: |
          node web/scripts/sync-module.mjs
          node scripts/build-ota-zip.mjs

      - name: Update update-stable.json
        run: node scripts/publish-stable-ota.mjs "${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TelegramControl-ota.zip
          generate_release_notes: true

      - name: Commit update-stable.json (optional metadata)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ota/update-stable.json
          git diff --staged --quiet || git commit -m "chore(ota): ${{ github.ref_name }} update-stable.json"
          git push || true
